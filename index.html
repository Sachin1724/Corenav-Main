
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORENAV | Advanced Autonomous Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --accent: #FF5C00; /* Industrial Orange */
        --accent-gold: #E2B04E;
        --bg-dark: #000000;
        --bg-light: #FAFAFA;
        --text-dark: #000000;
        --text-light: #FFFFFF;
      }
      body {
        background-color: var(--bg-light);
        color: var(--text-dark);
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      .font-syncopate {
        font-family: 'Syncopate', sans-serif;
      }
      .font-grotesk {
        font-family: 'Space Grotesk', sans-serif;
      }
      .orange-text {
        color: var(--accent);
      }
      .orange-bg {
        background-color: var(--accent);
      }
      .orange-border {
        border-color: var(--accent);
      }
      .gold-text {
        color: var(--accent-gold);
      }
      .gold-bg {
        background-color: var(--accent-gold);
      }
      .gold-border {
        border-color: var(--accent-gold);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }
      .tech-grid {
        background-image: radial-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .section-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--accent);
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 24px;
      }
      .section-label::before {
        content: '';
        width: 8px;
        height: 8px;
        background-color: var(--accent);
        display: inline-block;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--accent);
      }
    </style>
