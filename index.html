<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORENAV PRIVATE LIMITED | Advanced Autonomous Intelligence</title>
    <meta name="description" content="CORENAV is a deep-tech company specializing in autonomous aerial and ground robotics — precision drones, industrial automation bots, and next-gen navigation systems. Proudly Made in India.">
    <meta name="keywords" content="CoreNav, autonomous drones, robotics, industrial automation, made in India, STPI, BPUT, deep tech">
    <meta name="author" content="CORENAV PRIVATE LIMITED">
    <meta property="og:title" content="CORENAV PRIVATE LIMITED | Advanced Autonomous Intelligence">
    <meta property="og:description" content="Precision autonomous systems for the robotics age. Drones, bots, and AI-driven navigation from India's deep-tech frontier.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --accent: #FF5C00; /* Industrial Orange */
        --accent-gold: #FFC700;
        --bg-dark: #000000;
        --bg-light: #FFFFFF;
        --text-dark: #000000;
        --text-light: #FFFFFF;
      }
      body {
        background-color: var(--bg-dark);
        color: var(--text-light);
        font-family: 'Outfit', sans-serif;
        overflow-x: hidden;
        cursor: none;
      }
      .font-outfit {
        font-family: 'Outfit', sans-serif;
      }
      .font-inter {
        font-family: 'Inter', sans-serif;
      }
      .orange-text {
        color: var(--accent);
      }
      .orange-bg {
        background-color: var(--accent);
      }
      .orange-border {
        border-color: var(--accent);
      }
      .gold-text {
        color: var(--accent-gold);
      }
      .gold-bg {
        background-color: var(--accent-gold);
      }
      .gold-border {
        border-color: var(--accent-gold);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 0, 0, 0.05);
      }
      .tech-grid {
        background-image: radial-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .section-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: var(--accent);
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 24px;
      }
      .section-label::before {
        content: '';
        width: 8px;
        height: 8px;
        background-color: var(--accent);
        display: inline-block;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--accent);
      }

      /* ── Micro-Interactions ── */
      button, a, [role="button"] {
        cursor: none;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s, color 0.3s, background-color 0.3s;
      }
      button:hover, .cta-button:hover {
        transform: scale(1.03);
      }
      button:active, .cta-button:active {
        transform: scale(0.98);
      }

      /* Card lift on hover */
      .cursor-hover {
        cursor: none;
      }

      /* Idle pulse for primary CTA */
      @keyframes cta-pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(255, 199, 0, 0.3); }
        50% { box-shadow: 0 0 20px 4px rgba(255, 199, 0, 0.15); }
      }
      .cta-button {
        animation: cta-pulse 3s ease-in-out infinite;
      }
      .cta-button:hover {
        animation: none;
      }

      /* Smooth scroll */
      html {
        scroll-behavior: smooth;
      }

      /* Selection colors */
      ::selection {
        background-color: var(--accent-gold);
        color: var(--text-dark);
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
